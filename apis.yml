name: SoundHound
description: SoundHound AI is a voice AI and audio intelligence platform offering
  the Houndify conversational voice assistant API and a music fingerprint identification
  API. Developers can build voice-enabled applications using HTTP and WebSocket endpoints
  that accept audio or text queries and return structured JSON, powered by SoundHound's
  proprietary Speech-to-Meaning and Deep Meaning Understanding technologies.
