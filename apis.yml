apis:
  - name: Houndify Voice AI API
    description: The Houndify platform provides HTTP and WebSocket APIs that accept
      text or audio queries and return actionable JSON responses. Built on SoundHound's
      Speech-to-Meaning and Deep Meaning Understanding technologies, it enables developers
      to build context-aware conversational voice assistants with support for multiple
      languages, conversation state management, and real-time partial transcripts.
