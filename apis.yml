  - name: SoundHound Music Fingerprint Identification API
    description: A high-accuracy music recognition API capable of identifying copyrighted
      music from as little as 2 to 10 seconds of audio with sub-second latency for
      streamed requests. Designed for enterprise integration with built-in noise robustness
      and minimal audio data requirements, the API delivers fast and reliable music
      identification for applications requiring audio intelligence.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
